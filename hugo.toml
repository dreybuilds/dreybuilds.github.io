baseURL = "https://dreybuilds.github.io/"
languageCode = "en-us"
title = "Audrey Nzilani"
theme = "PaperMod"

[params]
  author = "Audrey Nzilani"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = true
  comments = true
  defaultTheme = "dark"
  disableThemeToggle = false
  giscusTheme = "dark_tritanopia"  # or "dark_dimmed", matches rest of site
  fontFamily = "Inter, Roboto, Segoe UI, sans-serif" # Clean dev-friendly font

  [params.homeInfoParams]
    Title = "Hi, I'm Audrey 👋"
    Content = "IoT | Full-Stack | Blockchain\n\nI design systems that connect hardware with the decentralized web."

  [params.assets]
    favicon = "favicon.ico"
    css = ["css/custom.css"]

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/dreybuilds"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://linkedin.com/in/audrey-nzilani"

[[params.socialIcons]]
  name = "twitter"
  url = "https://twitter.com/audreynzilani"

